name: Build OpenBSD Packages

# Standalone, on-demand builder for the OpenBSD SERVER packages, using the
# fully-offline port model (see installer/openbsd/Makefile + build-libs.sh).
#
# Two phases:
#   1. build-libs  — build the single, version-independent "complete" distfile
#      (backend source + built web UI + the pure-Python dependency bundle) and
#      its distinfo.  The frontend is built on Linux; the pure-Python bundle is
#      built in an OpenBSD VM (so it excludes the C/Rust deps that come from
#      ports).  This distfile is what the release publishes to R2 and what the
#      port fetches.
#   2. build-openbsd (matrix 7.8/7.9) — stage the port with that distfile +
#      distinfo and build the pre-built .tgz FULLY OFFLINE (no pip/npm/compiler
#      at port-build time).  Per-version because the .tgz records
#      version-specific dependency-package pins.
#
# workflow_dispatch only, so a slow/flaky emulated VM build never blocks a
# release.  The matching release tag's source is used for the backend/frontend.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (must match an existing release tag, e.g. 1.3.0.0)'
        required: true

permissions:
  contents: read

jobs:
  build-libs:
    name: Build OpenBSD libs distfile
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      # Build the frontend on Linux (fast) from the exact release tag; the
      # OpenBSD VM only assembles + bundles.
      - name: Build frontend + stage source at the release tag
        env:
          # user-controllable input → env only, never inlined into run: (semgrep)
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          set -e
          V="${RELEASE_VERSION#v}"
          git fetch --depth 1 origin "refs/tags/v${V}:refs/tags/v${V}"
          git checkout "v${V}" -- backend alembic alembic.ini scripts installer \
            requirements-prod.txt README.md LICENSE frontend 2>/dev/null || \
            git checkout "v${V}" -- backend alembic alembic.ini scripts installer \
            requirements-prod.txt frontend
          cd frontend
          npm install
          npm run build
          test -d dist && [ -n "$(ls -A dist)" ] || { echo "ERROR: no frontend dist/"; exit 1; }

      - name: Assemble libs distfile + distinfo (in an OpenBSD VM)
        uses: vmactions/openbsd-vm@18edb32f4e48dae5865d7b8b3a9587bc01218a20 # v1.4.4
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        with:
          release: '7.9'
          usesh: true
          sync: rsync
          envs: 'RELEASE_VERSION'
          run: |
            set -ex
            VERSION="${RELEASE_VERSION#v}"
            export FETCH_PACKAGES=

            # Fetch the 7.9 release ports tree (for the dep ports + the port
            # infrastructure that generates distinfo).
            ftp -o /tmp/ports.tar.gz "https://ftp.openbsd.org/pub/OpenBSD/7.9/ports.tar.gz"
            tar xzf /tmp/ports.tar.gz -C /usr && rm /tmp/ports.tar.gz

            # 1. Build the complete distfile from the synced source.
            sh "$GITHUB_WORKSPACE/installer/openbsd/build-libs.sh" \
              "$VERSION" "$GITHUB_WORKSPACE" /tmp/libout

            # Stage the port so `make makesum` can generate distinfo.
            PORT_DIR=/usr/ports/mystuff/www/sysmanage
            mkdir -p "$PORT_DIR"
            cp "$GITHUB_WORKSPACE/installer/openbsd/Makefile" "$PORT_DIR/"
            cp -r "$GITHUB_WORKSPACE/installer/openbsd/files" "$PORT_DIR/" 2>/dev/null || true
            cp -r "$GITHUB_WORKSPACE/installer/openbsd/pkg" "$PORT_DIR/" 2>/dev/null || true
            cd "$PORT_DIR"
            sed -i "s/^V =.*/V = ${VERSION}/" Makefile
            sed -i "s/^REVISION.*=.*/REVISION = 0/" Makefile
            DISTDIR=$(make show=DISTDIR)
            mkdir -p "$DISTDIR"
            cp "/tmp/libout/sysmanage-${VERSION}-openbsd.tar.gz" "$DISTDIR/"

            # 2. Generate distinfo (checksums the local distfile — no fetch).
            make makesum
            cat distinfo

            # Export both to the workspace.
            cp "/tmp/libout/sysmanage-${VERSION}-openbsd.tar.gz" "$GITHUB_WORKSPACE/"
            cp distinfo "$GITHUB_WORKSPACE/distinfo"

      - name: Upload libs distfile + distinfo
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-openbsd-libs
          path: |
            sysmanage-*-openbsd.tar.gz
            distinfo
          if-no-files-found: error

  build-openbsd:
    name: Build OpenBSD ${{ matrix.openbsd-version }} Package
    runs-on: ubuntu-latest
    timeout-minutes: 120
    needs: build-libs

    strategy:
      fail-fast: false
      matrix:
        # OpenBSD supports only the latest two releases; 7.7 is EOL.
        openbsd-version: ['7.8', '7.9']

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download libs distfile + distinfo
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: sysmanage-openbsd-libs
          path: libs/

      - name: Build on OpenBSD ${{ matrix.openbsd-version }}
        uses: vmactions/openbsd-vm@18edb32f4e48dae5865d7b8b3a9587bc01218a20 # v1.4.4
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        with:
          release: ${{ matrix.openbsd-version }}
          usesh: true
          sync: rsync
          envs: 'RELEASE_VERSION'
          run: |
            set -ex
            OPENBSD_VERSION="${{ matrix.openbsd-version }}"
            OPENBSD_VERSION_NODOT=$(echo "$OPENBSD_VERSION" | tr -d '.')
            VERSION="${RELEASE_VERSION#v}"
            # Dep ports come as binaries (recorded as @depend in the .tgz).
            export FETCH_PACKAGES=

            # 7.x release ports tree.
            ftp -o /tmp/ports.tar.gz "https://ftp.openbsd.org/pub/OpenBSD/${OPENBSD_VERSION}/ports.tar.gz"
            tar xzf /tmp/ports.tar.gz -C /usr && rm /tmp/ports.tar.gz

            # Stage the port + the pre-built distinfo (do NOT regenerate it —
            # end users get exactly this distinfo).
            PORT_DIR=/usr/ports/mystuff/www/sysmanage
            mkdir -p "$PORT_DIR"
            cp "$GITHUB_WORKSPACE/installer/openbsd/Makefile" "$PORT_DIR/"
            cp -r "$GITHUB_WORKSPACE/installer/openbsd/files" "$PORT_DIR/" 2>/dev/null || true
            cp -r "$GITHUB_WORKSPACE/installer/openbsd/pkg" "$PORT_DIR/" 2>/dev/null || true
            cp "$GITHUB_WORKSPACE/libs/distinfo" "$PORT_DIR/distinfo"
            cd "$PORT_DIR"
            sed -i "s/^V =.*/V = ${VERSION}/" Makefile
            sed -i "s/^REVISION.*=.*/REVISION = 0/" Makefile

            # Place the pre-built distfile in DISTDIR (the offline "fetch").
            DISTDIR=$(make show=DISTDIR)
            mkdir -p "$DISTDIR"
            cp "$GITHUB_WORKSPACE/libs/sysmanage-${VERSION}-openbsd.tar.gz" "$DISTDIR/"

            # Offline build: extract → fake → regenerate PLIST → package.
            make checksum
            make extract
            make fake
            make update-plist 2>&1 || echo "update-plist had warnings"
            make package

            # Guard: nothing should have compiled.  (No pip/npm here at all.)
            PKG_FILE=$(find /usr/ports/packages /usr/packages -name "sysmanage-*.tgz" -type f 2>/dev/null | grep -v 'sysmanage-agent' | head -1)
            if [ -z "$PKG_FILE" ]; then
              echo "ERROR: package not found"; find /usr/ports/packages /usr/packages -type f 2>/dev/null || true; exit 1
            fi
            tar ztf "$PKG_FILE" > /tmp/pc.txt
            grep -q 'share/sysmanage/frontend/index.html' /tmp/pc.txt || { echo "ERROR: no frontend"; exit 1; }
            grep -q 'libexec/sysmanage/pip-packages/fastapi' /tmp/pc.txt || { echo "ERROR: no pip bundle"; exit 1; }
            grep -q 'libexec/sysmanage/backend/main.py' /tmp/pc.txt || { echo "ERROR: no backend"; exit 1; }
            cp "$PKG_FILE" "$GITHUB_WORKSPACE/sysmanage-${VERSION}-openbsd${OPENBSD_VERSION_NODOT}.tgz"
            ls -la "$GITHUB_WORKSPACE"/*.tgz

      - name: Generate SHA256 checksum
        env:
          RELEASE_VERSION: ${{ github.event.inputs.version }}
        run: |
          V="${RELEASE_VERSION#v}"
          NODOT=$(echo '${{ matrix.openbsd-version }}' | tr -d '.')
          PKG="sysmanage-${V}-openbsd${NODOT}.tgz"
          sha256sum "$PKG" > "${PKG}.sha256"
          cat "${PKG}.sha256"

      - name: Upload OpenBSD ${{ matrix.openbsd-version }} package
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-openbsd-${{ matrix.openbsd-version }}-pkg
          path: "*.tgz*"
          if-no-files-found: error

  collect-packages:
    name: Collect All Packages
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-libs, build-openbsd]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          path: packages/
        continue-on-error: true

      - name: List all packages
        run: find packages/ \( -name "*.tgz" -o -name "*-openbsd.tar.gz" \) -type f 2>/dev/null || echo "none"

      - name: Upload combined packages
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        if: hashFiles('packages/**/*.tgz') != ''
        with:
          name: sysmanage-openbsd-all
          path: packages/
