name: Load Testing (Agent Fleet / DB / WebSocket)

# Two triggers:
#   1. workflow_dispatch — run on demand from the Actions UI.  Inputs
#      let you pick scenario / duration / Python version.
#   2. push of a release tag (v*.*.* or v*.*.*.*) — automatic baseline
#      capture per release, mirroring build-and-release.yml's trigger.
#      Tag-push runs use the workflow's hard-coded defaults below since
#      `workflow_dispatch.inputs.*` are empty on push events.
on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Which load scenario to run"
        required: true
        default: "agents-cascade"
        type: choice
        options:
          - "agents-cascade"   # 100 → 500 → 1000, gated; default for tag pushes
          - "agents-100"
          - "agents-500"
          - "agents-1000"
          - "db-perf"
          - "ws-throughput"
          - "ws-reconnect-storm"   # WS reliability harness — thundering herd
          - "ws-ordering"          # WS reliability harness — FIFO contract
          - "ws-backpressure"      # WS reliability harness — sustained-throughput probe
          - "all"
      duration_minutes:
        description: "Steady-state duration after warm-up"
        required: false
        default: "10"
        type: string
      python_version:
        description: "Python version for the harness"
        required: false
        default: "3.12"
        type: choice
        options: ["3.10", "3.11", "3.12", "3.13", "3.14"]
  push:
    # Mirror build-and-release.yml's tag pattern so a release tag also
    # captures a load-test baseline as part of the release record.
    tags:
      - 'v*.*.*'
      - 'v*.*.*.*'

permissions:
  contents: read

# ---------------------------------------------------------------------------
# Caveat documented in the audit:  free GitHub-hosted runners are 4 vCPU /
# 16 GB.  All N "agents" run as asyncio tasks in a single Python process,
# colocated with the FastAPI server on the same runner.  Numbers from this
# workflow tell you "no regression vs last run on the same hardware shape"
# — they are NOT representative of production hardware where server and
# agents would run on separate hosts with a real network in between.
#
# Harness contract (so this workflow runs without modification once the
# harness lands):
#
#   tests/load/run.py
#       --scenario [agents|db-perf|ws-throughput|ws-reconnect-storm|
#                   ws-ordering|ws-backpressure|all]
#       --agents N
#       --duration-seconds N
#       --server-url http://localhost:8000
#       --output-json /path/to/results.json
#
# WebSocket reliability harness (Phase 8 additions):
#   ws-reconnect-storm  — N agents cycle full auth handshake under load
#   ws-ordering         — single session, verify FIFO contract on receive loop
#   ws-backpressure     — single session, ramp send-rate; report breakpoint
#
#   On exit:
#     - exit 0  : run completed, results.json written
#     - exit 2  : SLA violation (e.g. p95 above documented threshold)
#     - exit 5  : harness not yet implemented (workflow treats as soft skip)
#
# Until tests/load/run.py exists, every job below logs a clear scaffolding
# message and exits 0.
# ---------------------------------------------------------------------------

jobs:
  load:
    name: "Load: ${{ inputs.scenario || 'agents-cascade' }} (${{ inputs.duration_minutes || '10' }} min)"
    runs-on: ubuntu-latest
    timeout-minutes: 240

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: abc123
          POSTGRES_USER: sysmanage
          POSTGRES_DB: sysmanage
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: ${{ inputs.python_version || '3.12' }}
          cache: pip

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Create test config
        run: |
          sudo mkdir -p /etc
          sudo tee /etc/sysmanage.yaml > /dev/null <<EOF
          api:
            host: "localhost"
            port: 8000
            certFile: ""
            chainFile: ""
            keyFile: ""
          database:
            user: "sysmanage"
            password: "abc123"
            host: "localhost"
            port: 5432
            name: "sysmanage"
          security:
            password_salt: "TEST_fBLqXrh6evnpiDOEA+TtFy1c4ItzVIyyMUsYhCraqLs="
            admin_userid: "admin@sysmanage.org"
            admin_password: "TEST_AdminPass123!"
            jwt_secret: "TEST_SuCHjkous8e0OgHRPxZ1Uayz0NS0b0SGXUXS26MUaZU="
            jwt_algorithm: "HS256"
            jwt_auth_timeout: 6000
            jwt_refresh_timeout: 60000
          webui:
            host: "localhost"
            port: 7443
          EOF

      - name: Run database migrations
        run: |
          python -c "from alembic.config import Config; from alembic import command; cfg = Config('alembic.ini'); command.upgrade(cfg, 'head')"
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql://sysmanage:abc123@localhost:5432/sysmanage

      - name: Start backend server
        run: |
          # Start the server in the background.  The harness will connect
          # to localhost.  We tail the log to a file the harness uploads
          # as an artifact on failure.
          mkdir -p .runtime-logs
          nohup python -m backend.main > .runtime-logs/server.log 2>&1 &
          echo $! > .runtime-logs/server.pid
          # Wait for /api/health to return 200 (max 60s)
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Server up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Server did not become healthy in 60s"
          tail -100 .runtime-logs/server.log
          exit 1
        env:
          PYTHONPATH: .
          DATABASE_URL: postgresql://sysmanage:abc123@localhost:5432/sysmanage

      - name: Run load scenario(s)
        run: |
          if [ ! -f tests/load/run.py ]; then
            echo "::warning::tests/load/run.py does not exist yet."
            echo "::warning::Load harness scaffolding TBD — see comment block at top of load-tests.yml for the contract."
            mkdir -p .runtime-logs
            echo "{\"status\": \"harness-not-implemented\"}" > .runtime-logs/results.json
            exit 0
          fi
          mkdir -p .runtime-logs
          DURATION_SECONDS=$(( ${{ inputs.duration_minutes || '10' }} * 60 ))

          # Run a single (scenario, args, output-name) tuple through the
          # harness.  Returns 0 on success / SLA-pass, 2 on SLA violation,
          # >0 on unexpected error.  Exit-5 ("not implemented") is treated
          # as soft success so the cascade continues.
          run_one() {
            local label="$1"; shift
            local out=".runtime-logs/results-${label}.json"
            echo ""
            echo "=== Running ${label} ==="
            set +e
            python tests/load/run.py "$@" \
              --duration-seconds "$DURATION_SECONDS" \
              --server-url http://localhost:8000 \
              --output-json "$out"
            local rc=$?
            set -e
            if [ $rc -eq 5 ]; then
              echo "::warning::Harness reported ${label} not implemented (exit 5) — treating as soft pass."
              return 0
            fi
            return $rc
          }

          SCENARIO="${{ inputs.scenario || 'agents-cascade' }}"
          case "$SCENARIO" in
            agents-cascade)
              # 100 → 500 → 1000.  Each gates the next:  if 100 fails (SLA
              # violation or worse), 500 and 1000 do not run.
              for n in 100 500 1000; do
                if ! run_one "agents-${n}" --scenario agents --agents "$n"; then
                  echo "::error::agents-${n} failed; not running larger scales."
                  exit 1
                fi
              done
              echo ""
              echo "=== Cascade complete:  agents-100, agents-500, agents-1000 all passed ==="
              ;;
            agents-100)    run_one "agents-100"    --scenario agents --agents 100  ;;
            agents-500)    run_one "agents-500"    --scenario agents --agents 500  ;;
            agents-1000)   run_one "agents-1000"   --scenario agents --agents 1000 ;;
            db-perf)       run_one "db-perf"       --scenario db-perf       ;;
            ws-throughput) run_one "ws-throughput" --scenario ws-throughput ;;
            ws-reconnect-storm)
                           run_one "ws-reconnect-storm" --scenario ws-reconnect-storm --agents 100 ;;
            ws-ordering)   run_one "ws-ordering"   --scenario ws-ordering   ;;
            ws-backpressure)
                           run_one "ws-backpressure" --scenario ws-backpressure ;;
            all)           run_one "all"           --scenario all           ;;
            *)
              echo "::error::Unknown scenario: $SCENARIO"
              exit 1
              ;;
          esac
        env:
          PYTHONPATH: .

      - name: Stop server
        if: always()
        run: |
          if [ -f .runtime-logs/server.pid ]; then
            kill "$(cat .runtime-logs/server.pid)" 2>/dev/null || true
          fi

      - name: Upload harness results + server log
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: load-${{ inputs.scenario || 'agents-cascade' }}-${{ inputs.duration_minutes || '10' }}min
          path: |
            .runtime-logs/results-*.json
            .runtime-logs/server.log
          if-no-files-found: ignore
