name: Build and Release

on:
  # Trigger on version tags (e.g., v1.0.0, v2.1.3, v0.9.0.3)
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*.*'

  # Manual dispatch — used to flip the Phase 11.8 upstream-publish jobs
  # (winget-pkgs / homebrew-tap / AUR) from dry_run to publish without
  # re-cutting a tag.  The BSD ports trees always render artifacts on
  # release; ``bsd_ports_artifacts=no`` skips that for ad-hoc test
  # dispatches.
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (without leading v). Leave blank to use tag.'
        required: false
        type: string
      winget_mode:
        description: 'winget-pkgs submission mode'
        required: false
        type: choice
        default: publish
        options:
          - dry_run
          - publish
      homebrew_mode:
        description: 'Homebrew tap publish mode'
        required: false
        type: choice
        default: publish
        options:
          - dry_run
          - publish
      aur_mode:
        description: 'AUR publish mode'
        required: false
        type: choice
        default: publish
        options:
          - dry_run
          - publish
      bsd_ports_artifacts:
        description: 'Render BSD port-tree artifacts on this run'
        required: false
        type: choice
        default: 'yes'
        options:
          - 'yes'
          - 'no'

permissions:
  contents: write  # Needed for creating releases and pushing to repos

jobs:
  # Wait for CI tests to pass before building
  wait-for-tests:
    name: Wait for CI Tests
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Backend Tests (Python 3.10)
        uses: lewagon/wait-on-check-action@74049309dfeff245fe8009a0137eacf28136cb3c # v1.5.0
        with:
          ref: ${{ github.sha }}
          check-name: 'Backend Tests (Python 3.10)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Wait for Backend Tests (Linux + PostgreSQL)
        uses: lewagon/wait-on-check-action@74049309dfeff245fe8009a0137eacf28136cb3c # v1.5.0
        with:
          ref: ${{ github.sha }}
          check-name: 'Backend Tests (Linux + PostgreSQL)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Wait for Frontend Tests (ubuntu-latest)
        uses: lewagon/wait-on-check-action@74049309dfeff245fe8009a0137eacf28136cb3c # v1.5.0
        with:
          ref: ${{ github.sha }}
          check-name: 'Frontend Tests (ubuntu-latest)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Wait for Frontend Tests (windows-latest)
        uses: lewagon/wait-on-check-action@74049309dfeff245fe8009a0137eacf28136cb3c # v1.5.0
        with:
          ref: ${{ github.sha }}
          check-name: 'Frontend Tests (windows-latest)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

      - name: Wait for Frontend Tests (macos-latest)
        uses: lewagon/wait-on-check-action@74049309dfeff245fe8009a0137eacf28136cb3c # v1.5.0
        with:
          ref: ${{ github.sha }}
          check-name: 'Frontend Tests (macos-latest)'
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 30

  # Ubuntu/Debian .deb Package Build
  build-ubuntu:
    name: Build .deb Package
    runs-on: ubuntu-22.04
    needs: wait-for-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Determine version
        id: version
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            debhelper \
            dh-python \
            python3-all \
            python3-setuptools \
            python3-pip \
            build-essential \
            devscripts \
            lintian

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install SBOM generation tools
        run: |
          # Install cyclonedx-bom for Python
          python3 -m pip install cyclonedx-bom

          # Install cyclonedx-npm globally for Node.js
          sudo npm install -g @cyclonedx/cyclonedx-npm || echo "Note: Global cyclonedx-npm install failed (will use project-local version via npx)"

          # Verify installations
          python3 -c "import cyclonedx_py; print('✓ cyclonedx-bom installed')"
          cyclonedx-npm --version || echo "Note: cyclonedx-npm not available globally (expected when using project-local version)"
        env:
          NODE_AUTH_TOKEN: ''

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Update changelog with version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DATE=$(date -R)

          # Update changelog with actual version and date
          sed -i "s/0\.1\.0-1/${VERSION}-1/g" installer/ubuntu/debian/changelog
          sed -i "s/Mon, 14 Oct 2025 00:00:00 -0400/$DATE/g" installer/ubuntu/debian/changelog

          echo "Updated changelog:"
          head -5 installer/ubuntu/debian/changelog

      - name: Build package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Building version: ${VERSION}"
          make installer-deb

      - name: Run lintian on package
        run: |
          lintian --no-tag-display-limit installer/dist/sysmanage_*.deb || true

      - name: Generate package information
        id: package_info
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          DEB_FILE="installer/dist/sysmanage_${VERSION}-1_all.deb"
          echo "deb_file=$DEB_FILE" >> $GITHUB_OUTPUT

          # Get package info
          dpkg-deb --info "$DEB_FILE"
          dpkg-deb --contents "$DEB_FILE" | head -20

          # Generate SHA256 checksum
          cd installer/dist
          sha256sum "sysmanage_${VERSION}-1_all.deb" > "sysmanage_${VERSION}-1_all.deb.sha256"

          echo "Package built: $DEB_FILE"
          echo "Size: $(du -h $DEB_FILE | cut -f1)"

      - name: Upload .deb as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-server-deb
          path: |
            installer/dist/sysmanage_*.deb
            installer/dist/sysmanage_*.deb.sha256

      - name: Upload SBOM files as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-sbom
          path: |
            sbom/*.json

  # OpenBSD Port Tarball Build
  build-openbsd-port:
    name: Build OpenBSD Port Tarball
    runs-on: ubuntu-22.04
    needs: wait-for-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Determine version
        id: version
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building OpenBSD port for version: $VERSION"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install SBOM generation tools
        run: |
          # Install cyclonedx-bom for Python
          python3 -m pip install cyclonedx-bom

          # Install cyclonedx-npm globally for Node.js
          sudo npm install -g @cyclonedx/cyclonedx-npm || echo "Note: Global cyclonedx-npm install failed (will use project-local version via npx)"

          # Verify installations
          python3 -c "import cyclonedx_py; print('[OK] cyclonedx-bom installed')"
          cyclonedx-npm --version || echo "Note: cyclonedx-npm not available globally (expected when using project-local version)"
        env:
          NODE_AUTH_TOKEN: ''

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Generate SBOM files
        run: |
          echo "Generating SBOM files..."
          make sbom

      - name: Build OpenBSD port tarball
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Building OpenBSD port tarball for version: ${VERSION}"
          make installer-openbsd

      - name: Generate SHA256 checksum
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd installer/dist
          sha256sum "sysmanage-openbsd-port-${VERSION}.tar.gz" > "sysmanage-openbsd-port-${VERSION}.tar.gz.sha256"
          echo "Checksum generated:"
          cat "sysmanage-openbsd-port-${VERSION}.tar.gz.sha256"

      - name: Upload OpenBSD port tarball as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-openbsd-port
          path: |
            installer/dist/sysmanage-openbsd-port-*.tar.gz
            installer/dist/sysmanage-openbsd-port-*.tar.gz.sha256

  # CentOS/RHEL/Fedora RPM Build
  build-centos-rpm:
    name: Build CentOS/RHEL RPM
    runs-on: ubuntu-22.04
    needs: wait-for-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Determine version
        id: version
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building CentOS RPM for version: $VERSION"

      - name: Install RPM build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install SBOM generation tools
        run: |
          # Install cyclonedx-bom for Python
          python3 -m pip install cyclonedx-bom

          # Install cyclonedx-npm globally for Node.js
          sudo npm install -g @cyclonedx/cyclonedx-npm || echo "Note: Global cyclonedx-npm install failed (will use project-local version via npx)"

          # Verify installations
          python3 -c "import cyclonedx_py; print('[OK] cyclonedx-bom installed')"
          cyclonedx-npm --version || echo "Note: cyclonedx-npm not available globally (expected when using project-local version)"
        env:
          NODE_AUTH_TOKEN: ''

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build CentOS RPM package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Building CentOS RPM for version: ${VERSION}"
          make installer-rpm-centos

      - name: Upload CentOS RPM as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-centos-rpm
          path: |
            installer/dist/sysmanage-*.rpm
            installer/dist/sysmanage-*.rpm.sha256

  # EL9 (RHEL/Rocky/Alma 9) RPM Build
  #
  # Same spec as the CentOS/Fedora RPM, but built with the %el9 + %dist
  # macros forced on so the dependency branch resolves to the python3.12
  # AppStream packages.  Rocky/RHEL 9's DEFAULT python3 is 3.9, so the
  # generic CentOS RPM's "Requires: python3 >= 3.12" is unsatisfiable
  # there — and the same RPM can't also serve Fedora (which wants
  # python3-pip, not EL9's python3.12-pip).  Publishing a distinct
  # sysmanage-<ver>-1.el9.x86_64.rpm lets the air-gap builder select the
  # right RPM per distro.
  build-el9-rpm:
    name: Build EL9 (RHEL/Rocky) RPM
    runs-on: ubuntu-22.04
    needs: wait-for-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Determine version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building EL9 RPM for version: $VERSION"

      - name: Install RPM build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install SBOM generation tools
        run: |
          python3 -m pip install cyclonedx-bom
          sudo npm install -g @cyclonedx/cyclonedx-npm || echo "Note: using project-local cyclonedx-npm via npx"

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Force EL9 dependency branch via rpm macros
        run: |
          # rpmbuild reads ~/.rpmmacros automatically.  Defining el9 + dist
          # here makes the shared spec take its EL9 branch (python3.12 /
          # python3.12-pip, present in Rocky/RHEL 9 AppStream) and tags the
          # RPM filename with .el9 — no Makefile change needed.
          printf '%%el9 1\n%%dist .el9\n' > "$HOME/.rpmmacros"
          cat "$HOME/.rpmmacros"

      - name: Build EL9 RPM package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Building EL9 RPM for version: ${VERSION}"
          make installer-rpm-centos
          echo "Produced:"
          ls -1 installer/dist/sysmanage-*.rpm

      - name: Upload EL9 RPM as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-el9-rpm
          path: |
            installer/dist/sysmanage-*.el9*.rpm
            installer/dist/sysmanage-*.el9*.rpm.sha256

  # OpenSUSE/SLES RPM Build
  build-opensuse-rpm:
    name: Build OpenSUSE/SLES RPM
    runs-on: ubuntu-22.04
    needs: wait-for-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Determine version
        id: version
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building OpenSUSE RPM for version: $VERSION"

      - name: Install RPM build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install SBOM generation tools
        run: |
          # Install cyclonedx-bom for Python
          python3 -m pip install cyclonedx-bom

          # Install cyclonedx-npm globally for Node.js
          sudo npm install -g @cyclonedx/cyclonedx-npm || echo "Note: Global cyclonedx-npm install failed (will use project-local version via npx)"

          # Verify installations
          python3 -c "import cyclonedx_py; print('[OK] cyclonedx-bom installed')"
          cyclonedx-npm --version || echo "Note: cyclonedx-npm not available globally (expected when using project-local version)"
        env:
          NODE_AUTH_TOKEN: ''

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build OpenSUSE RPM package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Building OpenSUSE RPM for version: ${VERSION}"
          make installer-rpm-opensuse
          # The openSUSE spec emits the same sysmanage-<ver>-1.x86_64.rpm
          # filename as the CentOS/RHEL/Fedora spec, so the two collide as
          # GitHub release assets — the survivor (openSUSE, which Requires:
          # python311-pip) then gets pulled by the Fedora/RHEL air-gap
          # builders and fails with "nothing provides python311-pip".
          # Tag the openSUSE RPM with a distinct, discoverable name so the
          # air-gap builder selects the right RPM per distro: the
          # Fedora/RHEL builders exclude *opensuse*; the openSUSE builder
          # matches *opensuse-leap*.
          cd installer/dist
          for f in sysmanage-*.rpm; do
            case "$f" in *opensuse*) continue ;; esac
            new="${f%.rpm}.opensuse-leap.rpm"
            mv "$f" "$new"
            sha256sum "$new" > "$new.sha256"
            rm -f "$f.sha256"
            echo "Renamed openSUSE RPM: $f -> $new"
          done

      - name: Upload OpenSUSE RPM as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-opensuse-rpm
          path: |
            installer/dist/sysmanage-*.rpm
            installer/dist/sysmanage-*.rpm.sha256

  # FreeBSD Package Build
  build-freebsd-pkg:
    name: Build FreeBSD Package
    runs-on: ubuntu-22.04
    needs: wait-for-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Determine version
        id: version
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building FreeBSD package for version: $VERSION"

      - name: Install FreeBSD packaging tools
        run: |
          sudo apt-get update
          # Install libarchive-tools for bsdtar which is compatible with FreeBSD pkg format
          sudo apt-get install -y libarchive-tools

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install SBOM generation tools
        run: |
          # Install cyclonedx-bom for Python
          python3 -m pip install cyclonedx-bom

          # Install cyclonedx-npm globally for Node.js
          sudo npm install -g @cyclonedx/cyclonedx-npm || echo "Note: Global cyclonedx-npm install failed (will use project-local version via npx)"

          # Verify installations
          python3 -c "import cyclonedx_py; print('[OK] cyclonedx-bom installed')"
          cyclonedx-npm --version || echo "Note: cyclonedx-npm not available globally (expected when using project-local version)"
        env:
          NODE_AUTH_TOKEN: ''

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build FreeBSD package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Building FreeBSD package for version: ${VERSION}"
          make installer-freebsd

      - name: Upload FreeBSD package as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-freebsd-pkg
          path: |
            installer/dist/sysmanage-*.pkg
            installer/dist/sysmanage-*.pkg.sha256

  build-macos-pkg:
    name: Build macOS Package
    runs-on: macos-14
    needs: wait-for-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Determine version
        id: version
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building macOS package for version: $VERSION"

      - name: Install Xcode Command Line Tools
        run: |
          # Ensure Xcode command line tools are installed
          xcode-select -p || xcode-select --install

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install SBOM generation tools
        run: |
          # Install cyclonedx-bom for Python
          python3 -m pip install cyclonedx-bom

          # Install cyclonedx-npm globally for Node.js
          npm install -g @cyclonedx/cyclonedx-npm || echo "Note: Global cyclonedx-npm install failed (will use project-local version via npx)"

          # Verify installations
          python3 -c "import cyclonedx_py; print('[OK] cyclonedx-bom installed')"
          cyclonedx-npm --version || echo "Note: cyclonedx-npm not available globally (expected when using project-local version)"
        env:
          NODE_AUTH_TOKEN: ''

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build macOS package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Building macOS package for version: ${VERSION}"
          make installer-macos

      - name: Upload macOS package as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-macos-pkg
          path: |
            installer/dist/sysmanage-*-macos.pkg
            installer/dist/sysmanage-*-macos.pkg.sha256

  build-netbsd-pkg:
    name: Build NetBSD Package
    runs-on: ubuntu-latest
    needs: wait-for-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Determine version
        id: version
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building NetBSD package for version: $VERSION"

      - name: Install NetBSD package tools
        run: |
          # Install pkg_create and related tools
          sudo apt-get update
          sudo apt-get install -y pkg-config

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install SBOM generation tools
        run: |
          # Install cyclonedx-bom for Python
          python3 -m pip install cyclonedx-bom

          # Install cyclonedx-npm globally for Node.js
          npm install -g @cyclonedx/cyclonedx-npm || echo "Note: Global cyclonedx-npm install failed (will use project-local version via npx)"

          # Verify installations
          python3 -c "import cyclonedx_py; print('[OK] cyclonedx-bom installed')"
          cyclonedx-npm --version || echo "Note: cyclonedx-npm not available globally (expected when using project-local version)"
        env:
          NODE_AUTH_TOKEN: ''

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build NetBSD package
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Building NetBSD package for version: ${VERSION}"
          make installer-netbsd

      - name: Upload NetBSD package as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-netbsd-pkg
          path: |
            installer/dist/sysmanage-*-netbsd.tgz
            installer/dist/sysmanage-*-netbsd.tgz.sha256

  build-windows-msi-x64:
    name: Build Windows MSI (x64)
    runs-on: windows-latest
    needs: wait-for-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version: '20'

      - name: Set up Python 3.12
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'

      - name: Determine version
        id: version
        shell: bash
        run: |
          # Extract version from tag (remove 'v' prefix)
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building Windows MSI (x64) for version: $VERSION"

      - name: Install WiX Toolset
        run: |
          # Pinned to WiX 6.x. WiX 7 added an Open Source Maintenance Fee
          # (OSMF) EULA that the CLI requires you to accept before running
          # `wix build` (error WIX7015). WiX 6 has no such requirement and
          # is API-compatible with our build script. To move to WiX 7 later,
          # follow https://wixtoolset.org/osmf/ to add a non-interactive
          # acceptance step before `wix build`.
          dotnet tool install --global wix --version 6.0.1
          wix --version

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Install SBOM generation tools
        run: |
          # Install cyclonedx-bom for Python
          python -m pip install cyclonedx-bom

          # Install cyclonedx-npm globally for Node.js
          npm install -g @cyclonedx/cyclonedx-npm || echo "Note: Global cyclonedx-npm install failed (will use project-local version via npx)"

          # Verify installations
          python -c "import cyclonedx_py; print('[OK] cyclonedx-bom installed')"
          cyclonedx-npm --version || echo "Note: cyclonedx-npm not available globally (expected when using project-local version)"
        env:
          NODE_AUTH_TOKEN: ''

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Build Windows MSI (x64)
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Building Windows MSI (x64) for version: $Env:VERSION"
          powershell -ExecutionPolicy Bypass -File installer\windows\build-msi.ps1 -Architecture x64

      - name: Upload Windows MSI (x64) as artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: sysmanage-windows-msi-x64
          path: |
            installer/dist/sysmanage-*-windows-x64.msi
            installer/dist/sysmanage-*-windows-x64.msi.sha256

