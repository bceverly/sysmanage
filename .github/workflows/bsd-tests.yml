name: BSD Integration Tests (FreeBSD/OpenBSD/NetBSD via QEMU)

# Two triggers:
#   1. workflow_dispatch — run on demand from the Actions UI.  BSD jobs
#      are slow (QEMU emulation, no KVM in GitHub-hosted runners), so
#      cron is intentionally avoided.
#   2. push of a release tag (v*.*.* or v*.*.*.*) — automatic per-
#      release BSD coverage capture, mirroring build-and-release.yml.
#      Tag-push runs use the dispatch defaults below since
#      `workflow_dispatch.inputs.*` are empty on push events.
on:
  workflow_dispatch:
    inputs:
      bsd:
        description: "Which BSD to test"
        required: false
        default: "all"
        type: choice
        options: ["all", "freebsd", "openbsd", "netbsd"]
      pytest_marker:
        description: "Marker filter (default: 'integration')"
        required: false
        default: "integration"
        type: string
      release_freebsd:
        description: "FreeBSD release tag"
        required: false
        default: "14.1"
        type: string
      release_openbsd:
        description: "OpenBSD release tag (current is 7.8)"
        required: false
        default: "7.8"
        type: string
      release_netbsd:
        description: "NetBSD release tag"
        required: false
        default: "10.0"
        type: string
  push:
    # Mirror build-and-release.yml's tag pattern.
    tags:
      - 'v*.*.*'
      - 'v*.*.*.*'

permissions:
  contents: read

# ---------------------------------------------------------------------------
# This workflow uses cross-platform-actions/action to spin up a BSD VM
# inside QEMU on a Linux runner.  It's slow — boot + install takes 5-15 min
# per OS — but it's free for public repos and gives real BSD coverage.
#
# Each job clones sysmanage-agent and runs the agent's integration test
# subset.  Server-side BSD is not tested (the server only ships for Linux).
#
# Native-build deps note:  the agent's requirements.txt pulls cryptography,
# aiohttp, pyyaml, and other packages with C/Rust extensions.  On BSDs there
# are no prebuilt wheels for these, and pip-building from source hits a
# known maturin/SOABI bug (cryptography → maturin "Unsupported platform:
# 311").  The workaround used here is:
#
#   1.  Install the heavy native packages from the BSD's own package
#       manager (pkg / pkg_add / pkgin) where prebuilt binaries exist.
#   2.  Create the venv with `--system-site-packages` so the venv inherits
#       the OS-installed packages.
#   3.  pip-install only the small pure-Python additions (pytest plugins).
#   4.  Skip `pip install -r requirements.txt` entirely — too fragile.
#
# Result: the agent's MODULE imports work because cryptography etc. are
# present from pkg, and pytest can collect tests.  If a particular test
# needs a dep that's not in the OS package set, that test will fail to
# collect and surface the gap clearly — at which point either pin a
# wheel-having version or add the OS package.
# ---------------------------------------------------------------------------

jobs:
  freebsd:
    name: "FreeBSD ${{ inputs.release_freebsd || '14.1' }} (QEMU)"
    if: ${{ (inputs.bsd || 'all') == 'all' || (inputs.bsd || 'all') == 'freebsd' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout sysmanage-agent
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: bceverly/sysmanage-agent
          path: sysmanage-agent

      - name: Run agent integration tests in FreeBSD VM
        # NOTE: pin to a SHA before merging.  The repo's convention is to
        # pin every third-party action — see the `# v4` comments on
        # actions/checkout etc.
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: freebsd
          version: ${{ inputs.release_freebsd || '14.1' }}
          run: |
            # FreeBSD pkg aborts the WHOLE batch if any package name is
            # unresolvable in the repo (unlike NetBSD pkgin and OpenBSD
            # pkg_add, which warn and continue).  Install per-package so
            # one missing name doesn't take down Python + everything.
            for p in \
              python311 py311-pip py311-sqlite3 git \
              py311-cryptography py311-pyyaml py311-aiohttp py311-websockets \
              py311-psutil py311-bcrypt
            do
              sudo pkg install -y "$p" || true
            done
            cd sysmanage-agent
            python3.11 -m venv --system-site-packages .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            # SQLAlchemy + aiofiles are not consistently packaged for
            # py311 on FreeBSD; install via pip (they have wheels or
            # are pure Python).  pytest/pytest-asyncio always via pip.
            python -m pip install pytest pytest-asyncio sqlalchemy aiofiles
            set +e
            python -m pytest tests/ -m "${{ inputs.pytest_marker || 'integration' }}" \
              -v --tb=short --junit-xml=bsd-freebsd-junit.xml
            rc=$?
            set -e
            if [ $rc -eq 5 ]; then
              echo "No agent tests tagged @pytest.mark.${{ inputs.pytest_marker || 'integration' }} — exiting clean."
              exit 0
            fi
            exit $rc

      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: bsd-freebsd-${{ inputs.release_freebsd || '14.1' }}-junit
          path: sysmanage-agent/bsd-freebsd-junit.xml

  openbsd:
    name: "OpenBSD ${{ inputs.release_openbsd || '7.8' }} (QEMU)"
    if: ${{ (inputs.bsd || 'all') == 'all' || (inputs.bsd || 'all') == 'openbsd' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout sysmanage-agent
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: bceverly/sysmanage-agent
          path: sysmanage-agent

      - name: Run agent integration tests in OpenBSD VM
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: openbsd
          version: ${{ inputs.release_openbsd || '7.8' }}
          run: |
            # OpenBSD packages use py3- prefix.  Python is pulled in
            # automatically as a dep of any py3-* package, so we don't
            # name it explicitly (the `python%3.12` flavor syntax used
            # by ports doesn't work in pkg_add).  pytest is not packaged
            # for OpenBSD — install it via pip below.
            # OpenBSD pkg_add tolerates missing names (warns and continues),
            # so a single batch is fine.  Drop py3-aiofiles — not packaged
            # — and pip install it (pure Python).
            sudo pkg_add -I \
              git py3-pip \
              py3-cryptography py3-yaml py3-aiohttp py3-websockets \
              py3-sqlalchemy py3-bcrypt py3-psutil || true
            cd sysmanage-agent
            python3 -m venv --system-site-packages .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install pytest pytest-asyncio aiofiles
            set +e
            python -m pytest tests/ -m "${{ inputs.pytest_marker || 'integration' }}" \
              -v --tb=short --junit-xml=bsd-openbsd-junit.xml
            rc=$?
            set -e
            if [ $rc -eq 5 ]; then
              echo "No agent tests tagged @pytest.mark.${{ inputs.pytest_marker || 'integration' }} — exiting clean."
              exit 0
            fi
            exit $rc

      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: bsd-openbsd-${{ inputs.release_openbsd || '7.8' }}-junit
          path: sysmanage-agent/bsd-openbsd-junit.xml

  netbsd:
    name: "NetBSD ${{ inputs.release_netbsd || '10.0' }} (QEMU)"
    if: ${{ (inputs.bsd || 'all') == 'all' || (inputs.bsd || 'all') == 'netbsd' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Checkout sysmanage-agent
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: bceverly/sysmanage-agent
          path: sysmanage-agent

      - name: Run agent integration tests in NetBSD VM
        uses: cross-platform-actions/action@v1.0.0
        with:
          operating_system: netbsd
          version: ${{ inputs.release_netbsd || '10.0' }}
          run: |
            # py311-pytest / py311-pytest-asyncio are not in pkgsrc — pip
            # them in below instead.  || true so missing pkg names don't
            # fail the whole install.
            sudo pkgin -y install \
              python311 py311-pip git \
              py311-cryptography py311-yaml py311-aiohttp py311-websockets \
              py311-sqlalchemy py311-bcrypt py311-psutil py311-aiofiles || true
            cd sysmanage-agent
            python3.11 -m venv --system-site-packages .venv
            . .venv/bin/activate
            python -m pip install --upgrade pip
            python -m pip install pytest pytest-asyncio
            set +e
            python -m pytest tests/ -m "${{ inputs.pytest_marker || 'integration' }}" \
              -v --tb=short --junit-xml=bsd-netbsd-junit.xml
            rc=$?
            set -e
            if [ $rc -eq 5 ]; then
              echo "No agent tests tagged @pytest.mark.${{ inputs.pytest_marker || 'integration' }} — exiting clean."
              exit 0
            fi
            exit $rc

      - name: Upload junit report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: bsd-netbsd-${{ inputs.release_netbsd || '10.0' }}-junit
          path: sysmanage-agent/bsd-netbsd-junit.xml
