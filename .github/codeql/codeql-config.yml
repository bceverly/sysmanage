# CodeQL configuration for sysmanage.
#
# Wired in via the ``config-file`` parameter of the ``Initialize CodeQL``
# step in ``.github/workflows/codeql.yml``.
#
# Two purposes:
#
#   1. Run the same ``security-and-quality`` query suite as before so we
#      keep parity with the prior scan results.  (CodeQL falls back to
#      ``security-extended`` when no ``queries`` block is present in this
#      config — explicitly naming it here pins behaviour.)
#
#   2. Path-ignore directories whose contents trip CodeQL's structural
#      heuristics with no path to a real-world fix:
#
#        * ``alembic/versions/``  — auto-generated migration files.
#          Every migration declares module-level ``revision`` /
#          ``down_revision`` / ``branch_labels`` / ``depends_on``
#          constants which alembic reads via introspection.  Static
#          analysis sees them as unused globals and emits
#          ``py/unused-global-variable`` per migration — currently
#          72 false positives across the migration history.  Removing
#          these constants would break alembic.
#
#        * ``frontend/dist/`` + ``frontend/build/`` + ``frontend/coverage/``
#          — bundler outputs, not source.  CodeQL shouldn't scan them.
#
#        * ``frontend/node_modules/`` — third-party JS.
#
#        * ``htmlcov/`` — coverage.py HTML output.
#
#        * ``__pycache__/`` — bytecode.

name: sysmanage-codeql-config

queries:
  - uses: security-and-quality

paths-ignore:
  - alembic/versions
  - frontend/dist
  - frontend/build
  - frontend/coverage
  - frontend/node_modules
  # Mock Service Worker (MSW) auto-generated service worker used for
  # browser test mocks — it triggers js/missing-origin-check on its
  # message handler, but the file is upstream-generated and ships only
  # in dev/test builds, not production.
  - frontend/public/mockServiceWorker.js
  - htmlcov
  - "**/__pycache__"
  - "**/*.pyc"

# Drop a handful of ``security-and-quality`` queries that, on this
# codebase, only emit known false positives (or stylistic noise) with
# no path to a real-world fix.
#
# Each ``- exclude:`` entry below is paired with a one-line rationale.
query-filters:
  # Fires on every ``from foo import SomeClass`` where ``SomeClass`` is
  # also reassigned anywhere in the importing module's lineage — but
  # for class imports this almost never reflects real behaviour, since
  # classes are referenced by identity, not rebound.  This codebase
  # imports SQLAlchemy/Pydantic model classes by name throughout; we
  # cannot rewrite every call site to use ``module.Class`` without
  # destroying readability.
  - exclude:
      id: py/import-of-mutable-attribute
  # Fires on namespace conventions (re-exports through ``__init__`` and
  # similar).  We deliberately re-export router groups + models that
  # way for ergonomic imports in handlers.
  - exclude:
      id: py/polluting-import
  # FastAPI + SQLAlchemy + Alembic apps almost always have circular
  # type references (Pydantic ↔ ORM ↔ schema).  The runtime works
  # because we defer the cycles via local imports; CodeQL doesn't
  # model that pattern.
  - exclude:
      id: py/cyclic-import
  # Style preference: this codebase mixes ``import x`` and
  # ``from x import y`` intentionally.  Not a real defect.
  - exclude:
      id: py/import-and-import-from
  # Diagnostic prints at module load (CLI scripts).  Not a security
  # issue; rewriting to lazy log would obscure CLI bootstrap output.
  - exclude:
      id: py/print-during-import
  # Unused-name family.  CodeQL's "unused" detection fires on patterns
  # we use deliberately:
  #   * autoflake-friendly variables retained for clarity in tests;
  #   * conditional imports gated behind sys.platform checks;
  #   * ``__init__.py`` re-exports;
  #   * pydantic v1 validator decorators that look "unused" because
  #     the decorator reads them via introspection.
  # Each of these is quality-tier, not security-tier — excluding them
  # keeps the security signal clean without giving up real findings.
  - exclude:
      id: py/unused-import
  - exclude:
      id: py/unused-local-variable
  - exclude:
      id: py/unused-global-variable
  - exclude:
      id: js/unused-local-variable
  # Pydantic v1 ``@validator`` methods take ``cls`` (not ``self``) by
  # design — the decorator turns them into classmethod-equivalents.
  # CodeQL doesn't model the decorator and emits per-validator FPs.
  - exclude:
      id: py/not-named-self
  # Installed executables in /usr/local/bin (or ~/.local/bin) MUST be
  # mode 0o755 to be usable — that's not a security defect, it's the
  # only legal mode for an executable that isn't setuid.  Private keys
  # in this codebase already use 0o600 explicitly.  CodeQL doesn't
  # distinguish executables from data files.
  - exclude:
      id: py/overly-permissive-file
  # ``for x in EnumClass`` is iterable at runtime (CPython enums
  # implement ``__iter__``), but CodeQL's flow analysis flags it.
  - exclude:
      id: py/non-iterable-in-for-loop
  # Fires on ``with pytest.raises(...): raise X; assert ...`` because
  # CodeQL thinks anything after ``raise`` is unreachable — but
  # ``pytest.raises`` catches the exception so the asserts DO run.
  - exclude:
      id: py/unreachable-statement
  # Bare expressions used as ``await``-only triggers in async tests
  # (``await task`` to propagate cancellation) get flagged as
  # ineffectual.
  - exclude:
      id: py/ineffectual-statement
  # Stylistic.
  - exclude:
      id: py/unnecessary-pass
