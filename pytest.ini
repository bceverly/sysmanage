[pytest]
addopts = --tb=short -v
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Silence the FastAPI startup logger noise during test runs.  The
# ``backend.startup.*``, ``backend.websocket.*``, and friends emit
# dozens of INFO lines per app construction (CORS origin generation,
# route registration, OpenTelemetry probe, exception-handler
# registration, lifecycle phases, queue-manager init).  When pytest
# imports backend.main during collection or coverage, that chatter
# floods the test output.  Raise the floor to WARNING in tests; the
# actual server still uses INFO at runtime.
log_level = WARNING
log_cli_level = WARNING
log_format = %(asctime)s %(levelname)s %(name)s %(message)s
log_date_format = %Y-%m-%d %H:%M:%S
markers =
    integration: marks integration tests (selected by .github/workflows/integration-tests.yml)
    security: marks auth/authz security tests (selected by .github/workflows/pen-tests.yml)
    performance: marks scale/perf harness tests (opt-in; tiny by default, crank via FED_PERF_* env)
filterwarnings =
    # Default: ANY warning is an error so warnings can't scroll off-screen
    # unnoticed and rot. Known, out-of-our-control third-party warnings are
    # explicitly re-allowed below — pytest applies the LAST matching filter, so
    # these ignores override the catch-all. Add a targeted ignore here only for a
    # warning we genuinely cannot fix in our own code.
    error
    # OpenBSD/NetBSD coverage wheels ship no compiled C tracer; coverage falls
    # back to the pure-Python tracer and warns. The fallback is fine — don't let
    # the warning fail the run on those platforms (inert where the C tracer exists).
    ignore::coverage.exceptions.CoverageWarning
    ignore:.*deprecated.*:DeprecationWarning
    ignore:.*imp module is deprecated.*:DeprecationWarning
    ignore:.*distutils.*:DeprecationWarning
    ignore:.*pkg_resources.*:DeprecationWarning
    ignore:pkg_resources is deprecated as an API.*:UserWarning:opentelemetry.instrumentation.dependencies
    ignore::pytest.PytestCollectionWarning
    ignore::pytest.PytestConfigWarning
    ignore:.*The event_loop fixture.*:DeprecationWarning
    # starlette 1.x's TestClient deprecates httpx in favour of httpx2; the
    # TestClient is test-only and the app + Pro+ engines use httpx directly, so
    # migrating is out of scope here.  StarletteDeprecationWarning isn't a
    # DeprecationWarning subclass, so match it by message.
    ignore:Using .httpx. with .starlette.testclient. is deprecated.*:
    ignore:.*Identity map already had an identity.*:sqlalchemy.exc.SAWarning
    ignore:urllib3 v2 only supports OpenSSL.*:
    ignore:unclosed event loop.*:ResourceWarning
    ignore:coroutine 'AsyncMockMixin\._execute_mock_call' was never awaited:RuntimeWarning
    # INTERIM (Phase 13.2.1): the same un-awaited AsyncMock coroutine leak as the
    # line above, but its *finalization* raises during GC teardown on Python 3.14
    # (a transient KeyError: '__import__' as builtins are torn down), which pytest
    # surfaces as PytestUnraisableExceptionWarning at the NEXT test's setup — so it
    # lands on an innocent victim test under xdist (~1-in-4, non-deterministic).
    # This is test-pollution noise, not a product bug; matched narrowly by message
    # so only this AsyncMock finalization is suppressed. TODO: find + fix the test
    # that leaves an AsyncMock coroutine un-awaited, then drop both ignores.
    ignore:Exception ignored while finalizing coroutine.*AsyncMockMixin\._execute_mock_call.*:pytest.PytestUnraisableExceptionWarning
    # Silence per-worker "No data was collected" chatter from coverage.py 7.x
    # when running with pytest-xdist (-n auto): each worker that handles a
    # file whose tests don't import any backend module emits this warning,
    # which produces dozens of redundant lines per test run.  Coverage data
    # is still aggregated correctly across workers.
    ignore:No data was collected.*: