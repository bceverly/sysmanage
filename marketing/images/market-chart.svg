  <text x="297" y="433" font-size="12" font-weight="bold" fill="#1976d2">~$3B</text>

  <line x1="280" y1="452" x2="280" y2="70" stroke="#dfe4e8" stroke-width="1"/>

  <text x="390" y="474" font-size="10" fill="#6c757d" text-anchor="middle">Segments overlap and are not additive. Sources listed in the References section; figures are representative public forecasts.</text>
  <text x="390" y="489" font-size="10" fill="#6c757d" text-anchor="middle">Managed services (~$731B by 2030) is an adjacent delivery channel and is excluded from the chart to preserve scale.</text>
