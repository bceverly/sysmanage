<?xml version="1.0" encoding="UTF-8"?>
<svg width="780" height="500" viewBox="0 0 780 500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="780" height="500" fill="#ffffff"/>

  <text x="390" y="30" font-size="17" font-weight="bold" fill="#2c3e50" text-anchor="middle">Enterprise Software Markets SysManage Spans</text>
  <text x="390" y="50" font-size="11" fill="#6c757d" text-anchor="middle">Representative annual market size, ~2030 forecasts (USD, billions) — individual segments, not additive</text>

